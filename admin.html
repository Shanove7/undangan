<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Generate Link</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', sans-serif; background-color: #f5f5f4; }
  .font-serif { font-family: 'Playfair Display', serif; }
  .gold-text { color: #d97706; }
  .gold-bg { background-color: #d97706; }
  .gold-hover:hover { background-color: #b45309; }
  .dark-bg { background-color: #1c1917; }
</style>
</head>
<body class="min-h-screen p-4 md:p-8 text-gray-800">
<div class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-gray-200">
  <h1 class="text-2xl md:text-3xl font-serif font-bold mb-8 text-center gold-text">Buat Link Undangan</h1>
  <form id="adminForm" class="space-y-5 md:space-y-6">
    <div>
      <label class="block text-sm font-medium mb-2">Nama Pria</label>
      <input type="text" id="groomName" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" value="Imron Fakhrozi">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Nama Wanita</label>
      <input type="text" id="brideName" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" value="Elza Dian Mey Wulandari">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Nama Tamu Undangan</label>
      <input type="text" id="guestName" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" placeholder="Contoh: Budi & Keluarga">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Tanggal & Waktu Acara</label>
      <input type="datetime-local" id="targetDate" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">File Musik (MP3)</label>
      <input type="text" id="musicFile" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" placeholder="Contoh: musik-kita.mp3">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Link Google Maps (Akad)</label>
      <input type="text" id="mapAkad" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" placeholder="http://googleusercontent.com/maps...">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Link Google Maps (Resepsi)</label>
      <input type="text" id="mapResepsi" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" placeholder="http://googleusercontent.com/maps...">
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Nomor Rekening SeaBank</label>
      <input type="text" id="noRekening" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-yellow-400 outline-none text-sm md:text-base" placeholder="Contoh: 9012345678">
    </div>
    <button type="submit" class="w-full dark-bg hover:bg-black text-white font-bold py-4 rounded-xl transition-colors text-sm md:text-base mt-4">Generate Link</button>
  </form>

  <div id="resultContainer" class="hidden mt-8 p-5 md:p-6 border border-gray-200 rounded-2xl bg-gray-50">
    <p class="mb-3 font-bold text-gray-700 text-sm md:text-base">Link siap dibagikan:</p>
    <input type="text" id="resultUrl" class="w-full p-3 border border-gray-300 rounded-xl mb-4 bg-white text-sm md:text-base" readonly>
    <button id="copyBtn" class="w-full gold-bg gold-hover text-white font-medium px-4 py-3 rounded-xl transition-colors text-sm md:text-base">Salin Link Undangan</button>
  </div>
</div>

<script>
  document.getElementById('adminForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const groom = encodeURIComponent(document.getElementById('groomName').value || 'Imron Fakhrozi');
    const bride = encodeURIComponent(document.getElementById('brideName').value || 'Elza Dian Mey Wulandari');
    const guest = encodeURIComponent(document.getElementById('guestName').value || 'Bapak/Ibu/Saudara/i');
    const date = encodeURIComponent(document.getElementById('targetDate').value || '2026-12-31T08:00');
    const music = encodeURIComponent(document.getElementById('musicFile').value || 'file-musik-kamu.mp3');
    const map1 = encodeURIComponent(document.getElementById('mapAkad').value || '#');
    const map2 = encodeURIComponent(document.getElementById('mapResepsi').value || '#');
    const rek = encodeURIComponent(document.getElementById('noRekening').value || '1234567890');
    
    let baseUrl = window.location.href.split('?')[0].replace('admin.html', 'index.html');
    const shareUrl = baseUrl + '?to=' + guest + '&groom=' + groom + '&bride=' + bride + '&date=' + date + '&music=' + music + '&map1=' + map1 + '&map2=' + map2 + '&rek=' + rek;
    
    document.getElementById('resultUrl').value = shareUrl;
    document.getElementById('resultContainer').classList.remove('hidden');
  });

  document.getElementById('copyBtn').addEventListener('click', function() {
    const copyText = document.getElementById('resultUrl');
    copyText.select();
    copyText.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(copyText.value);
    alert('Link berhasil disalin!');
  });
</script>
</body>
</html>
